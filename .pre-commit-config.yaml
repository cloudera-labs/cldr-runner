repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: forbid-submodules
  - repo: https://github.com/asottile/add-trailing-comma.git
    rev: v3.2.0
    hooks:
      - id: add-trailing-comma
        name: ensure trailing commas
        args:
          - --py36-plus
  - repo: local
    hooks:
      - id: unidecode-check
        name: check for non-ASCII characters
        entry: .local/unidecode-hook.py # A Python script to run the check
        language: python
        types: [text] # Or [python] or others if applicable
        # You might want to configure options for the hook here
        # Example: Pass arguments to your script
        args: ["--to-ascii"]
        additional_dependencies: [unidecode]
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        name: lint python
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.91.0
    hooks:
      - id: terraform_fmt
        name: lint terraform
      - id: terraform_docs
        name: check terraform docs
