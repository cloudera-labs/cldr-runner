[project]
name = "cldr-runner"
description = "Ansible Execution Environments for Cloudera"
readme = "README.md"
requires-python = ">=3.8"
license = "Apache-2.0"
keywords = []
authors = [
  { name = "Webster Mudge", email = "wmudge@cloudera.com" },
]
classifiers = []
dependencies = []
dynamic = ["version"]

[tool.hatch.version]
path = "VERSION.txt"
scheme = "semver"
validate-bump = true

[tool.hatch.envs.default]
python = "3.12"
detached = true
dependencies = [
  "pre-commit",
  "coverage[toml]",
  "ansible-core<2.17", # For RHEL 8 support
  "ansible-builder",
]

[tool.hatch.envs.lint]
python = "3.12"
detached = true
extra-dependencies = [
  "ansible-lint",
]

[tool.hatch.envs.lint.scripts]
run = "pre-commit run -a"

[build-system]
requires = [
  "hatchling",
  "hatch-semver",
]
build-backend = "hatchling.build"
